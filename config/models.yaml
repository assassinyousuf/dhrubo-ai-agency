# models.yaml — LLM provider routing per agent role.
#
# The "default" provider is used when no role-specific route exists.
# Add a new route for any new agent so the framework knows what model to call.

default:
  name: openai
  model: qwen3-vl-8b-instruct
  temperature: 0.2
  max_tokens: 2048
  timeout_seconds: 60

routes:
  - role: planner
    provider:
      name: openai
      model: qwen3-vl-8b-instruct
      temperature: 0.1
      max_tokens: 4096
      timeout_seconds: 120

  - role: ui_reviewer
    provider:
      name: openai
      model: qwen3-vl-8b-instruct
      temperature: 0.3
      max_tokens: 4096
      timeout_seconds: 120
    vision: true

  - role: seo_reviewer
    provider:
      name: openai
      model: qwen3-vl-8b-instruct
      temperature: 0.1
      max_tokens: 2048
      timeout_seconds: 60

  - role: performance_reviewer
    provider:
      name: openai
      model: qwen3-vl-8b-instruct
      temperature: 0.1
      max_tokens: 2048
      timeout_seconds: 60

  - role: report_writer
    provider:
      name: openai
      model: qwen3-vl-8b-instruct
      temperature: 0.4
      max_tokens: 4096
      timeout_seconds: 180

  - role: qa_reviewer
    provider:
      name: openai
      model: qwen3-vl-8b-instruct
      temperature: 0.0
      max_tokens: 1024
      timeout_seconds: 60
