# permissions.yaml — Tool access allow-list per agent role.
#
# Failure mode is fail-closed: an agent with no entry has no tool access.
# Listing an agent explicitly with `tools: []` is equivalent to no access
# (kept explicit so reviewers can see the intent).

agents:
  - role: planner
    tools: []

  - role: page_indexer
    tools: []

  - role: website_crawler
    tools:
      - browser

  - role: screenshot_agent
    tools:
      - browser

  - role: ui_reviewer
    tools: []

  - role: seo_reviewer
    tools: []

  - role: performance_reviewer
    tools:
      - lighthouse

  - role: accessibility_reviewer
    tools:
      - axe

  - role: security_reviewer
    tools:
      - security

  - role: branding_reviewer
    tools:
      - branding

  - role: report_writer
    tools: []

  - role: diff_reviewer
    tools:
      - diff

  - role: qa_reviewer
    tools: []

  - role: exporter
    tools:
      - markdown_to_pdf

  - role: publisher
    tools:
      - github_comment
