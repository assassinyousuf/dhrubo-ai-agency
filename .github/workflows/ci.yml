name: Dhrubo CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[browser,pdf,api]
        pip install flake8 pytest
        
    - name: Install Playwright Browsers
      run: |
        playwright install chromium
        
    - name: Lint with Flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/dhrubo scripts --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Validate DAG Architecture (Plan Only)
      run: |
        # Ensure the pipeline builds cleanly without circular dependencies
        python -m dhrubo.commands.cli plan
